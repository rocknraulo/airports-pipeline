<title>Autoridades · Entes regulatorios LATAM</title>
<meta name="description" content="Mapa de organismos que regulan, operan, conceden y compran infraestructura aeroportuaria en LATAM. Ficha por país y por ente.">
<meta property="og:title" content="Autoridades · Entes regulatorios LATAM">
<meta property="og:description" content="Mapa de organismos que regulan, operan, conceden y compran infraestructura aeroportuaria en LATAM.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://rauldutra.com/autoridades">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0A0E1A;
  --bg-surface: #111726;
  --bg-elev: #1A2235;
  --bg-glass: rgba(26, 34, 53, 0.65);
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.16);
  --text-primary: #F4F6FB;
  --text-secondary: #9BA3B7;
  --text-muted: #6B7388;
  --accent: #F5C56C;
  --accent-bright: #FFD685;
  --accent-deep: #C99744;
  --rose: #E27B7B;
  --grad-bg: radial-gradient(ellipse at top right, rgba(245, 197, 108, 0.08), transparent 50%),
             radial-gradient(ellipse at bottom left, rgba(93, 211, 197, 0.06), transparent 50%),
             #0A0E1A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: var(--grad-bg);
  background-attachment: fixed;
  color: var(--text-primary);
  font-family: 'Geist', -apple-system, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s, transform 0.2s;
}

.back-link:hover {
  color: var(--accent);
  transform: translateX(-3px);
}

/* HERO */
.hero {
  margin-bottom: 28px;
  padding: 28px 24px;
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  top: -50%;
  right: -20%;
  width: 60%;
  height: 200%;
  background: radial-gradient(ellipse, rgba(245, 197, 108, 0.12) 0%, transparent 60%);
  pointer-events: none;
}

.hero-eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-eyebrow::before {
  content: "";
  width: 24px;
  height: 1px;
  background: var(--accent);
}

.hero h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 32px;
  font-weight: 500;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.hero h1 em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}

.hero-sub {
  color: var(--text-secondary);
  font-size: 14px;
  max-width: 580px;
}

@media (min-width: 768px) {
  .app { padding: 32px 24px 80px; }
  .hero { padding: 36px 40px; }
  .hero h1 { font-size: 40px; }
}

/* TABS DE VERTICAL */
.vertical-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}

.vertical-tab {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}

.vertical-tab:not(.disabled):hover {
  border-color: var(--accent);
  color: var(--accent);
}

.vertical-tab.active {
  background: rgba(245, 197, 108, 0.1);
  border-color: var(--accent);
  color: var(--accent-bright);
}

.vertical-tab.disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.vertical-tab-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 999px;
  text-transform: uppercase;
}

/* CHIPS DE PAÍS */
.country-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
}

.country-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}

.country-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.country-chip.active {
  background: rgba(245, 197, 108, 0.1);
  border-color: var(--accent);
  color: var(--accent-bright);
}

.country-chip-count {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
}

.country-chip.active .country-chip-count {
  color: var(--accent);
}

/* GRID DE ENTES */
.entes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

.entes-empty {
  grid-column: 1 / -1;
  padding: 32px 16px;
  text-align: center;
  color: var(--text-muted);
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.ente-card {
  padding: 16px 18px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, background 0.2s;
  text-align: left;
  font-family: inherit;
  color: inherit;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.ente-card:hover {
  border-color: var(--border-strong);
  background: var(--bg-elev);
  transform: translateY(-2px);
}

.ente-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.ente-card-sigla {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}

.ente-card-tipo {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
  padding: 3px 8px;
  background: rgba(245, 197, 108, 0.08);
  color: var(--accent);
  border: 1px solid rgba(245, 197, 108, 0.2);
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

.ente-card-rol {
  color: var(--text-secondary);
  font-size: 12px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* DRAWER (calcado del viejo) */
.drawer-bg {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 26, 0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.drawer-bg.open {
  opacity: 1;
  pointer-events: auto;
}

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  max-width: 540px;
  background: var(--bg-primary);
  border-left: 1px solid var(--border-strong);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.drawer.open {
  transform: translateX(0);
}

.drawer-header {
  position: sticky;
  top: 0;
  padding: 20px 24px;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  z-index: 2;
}

.drawer-title {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

.drawer-title h2 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.drawer-close {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}

.drawer-close:hover {
  background: var(--bg-elev);
  color: var(--text-primary);
}

.drawer-body {
  padding: 16px 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* CONTENIDO DE LA FICHA */
.drawer-sigla-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.drawer-sigla {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.drawer-tipo {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  background: rgba(245, 197, 108, 0.08);
  color: var(--accent);
  border: 1px solid rgba(245, 197, 108, 0.25);
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

.drawer-rol {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 16px;
  line-height: 1.5;
  color: var(--text-primary);
}

.drawer-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  align-self: flex-start;
  padding: 10px 14px;
  background: rgba(245, 197, 108, 0.08);
  border: 1px solid rgba(245, 197, 108, 0.25);
  border-radius: 8px;
  color: var(--accent);
  text-decoration: none;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.15s, color 0.15s;
}

.drawer-link:hover {
  background: rgba(245, 197, 108, 0.15);
  color: var(--accent-bright);
}

.drawer-meta {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-secondary);
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.drawer-meta strong {
  color: var(--text-primary);
  font-weight: 500;
}

/* GATE */
#gate { font-family: 'Geist', sans-serif; }
</style>
</head>

<div class="app">

  <a href="/" class="back-link">
    <span class="arrow">←</span>
    <span>rauldutra.com</span>
  </a>

  <header class="hero">
    <div class="hero-eyebrow">Autoridades · Entes regulatorios LATAM</div>
    <h1>Quién <em>decide</em> en cada país</h1>
    <p class="hero-sub">Mapa de organismos que regulan, operan, conceden y compran infraestructura en LATAM. Elegí una vertical, después un país, después un ente.</p>
  </header>

  <div class="vertical-tabs" id="vertical-tabs"></div>
  <div class="country-chips" id="country-chips"></div>
  <div class="entes-grid" id="entes-grid"></div>

</div>

<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">
      <h2 id="drawer-nombre">—</h2>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- PASSWORD GATE -->
<div id="gate" style="position:fixed;inset:0;background:#0A0E1A;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;">
  <div style="font-family:'Fraunces',serif;font-size:24px;color:#F5C56C;letter-spacing:-0.01em;">Raúl Dutra</div>
  <div style="font-size:13px;color:#9BA3B7;letter-spacing:0.05em;">Acceso privado</div>
  <input id="gate-input" type="password" autocomplete="off" placeholder="••••" style="background:rgba(245,197,108,0.06);border:1px solid rgba(245,197,108,0.3);border-radius:10px;padding:14px 20px;font-family:'Geist Mono',monospace;font-size:18px;color:#FFD685;text-align:center;width:200px;letter-spacing:0.3em;outline:none;">
  <div id="gate-error" style="font-size:12px;color:#E07A7A;height:14px;opacity:0;transition:opacity 0.2s;">Contraseña incorrecta</div>
</div>

<script>
// ============ DATA ============
const DATA = JSON.parse(document.getElementById('autoridades-data').textContent);

const VERTICALES = [
  { id: 'airports', label: 'Airports', enabled: true },
  { id: 'roads',    label: 'Roads',    enabled: false },
  { id: 'rail',     label: 'Rail',     enabled: false },
  { id: 'agua',     label: 'Agua',     enabled: false }
];

const state = { vertical: 'airports', pais: null, enteAbierto: null };

// ============ ESCAPE HTML ============
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ============ RENDER VERTICALES ============
function renderVerticales() {
  const root = document.getElementById('vertical-tabs');
  root.innerHTML = '';
  VERTICALES.forEach(v => {
    const tab = document.createElement('button');
    tab.type = 'button';
    tab.className = 'vertical-tab' + (v.enabled ? '' : ' disabled') + (state.vertical === v.id ? ' active' : '');
    tab.dataset.vertical = v.id;
    tab.innerHTML = `<span>${esc(v.label)}</span>` + (v.enabled ? '' : `<span class="vertical-tab-badge">Próximamente</span>`);
    if (v.enabled) {
      tab.addEventListener('click', () => {
        if (state.vertical === v.id) return;
        state.vertical = v.id;
        state.pais = null;
        state.enteAbierto = null;
        renderVerticales();
        renderPaises();
        renderEntes();
      });
    }
    root.appendChild(tab);
  });
}

// ============ RENDER CHIPS DE PAÍS ============
function renderPaises() {
  const root = document.getElementById('country-chips');
  root.innerHTML = '';
  const arbol = DATA.navegacion[state.vertical] || {};
  const paises = Object.keys(arbol);
  paises.forEach(pais => {
    const ids = arbol[pais] || [];
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'country-chip' + (state.pais === pais ? ' active' : '');
    chip.dataset.pais = pais;
    chip.innerHTML = `<span>${esc(pais)}</span><span class="country-chip-count">(${ids.length})</span>`;
    chip.addEventListener('click', () => {
      state.pais = (state.pais === pais) ? null : pais;
      state.enteAbierto = null;
      renderPaises();
      renderEntes();
    });
    root.appendChild(chip);
  });
}

// ============ RENDER CARDS DE ENTES ============
function renderEntes() {
  const root = document.getElementById('entes-grid');
  root.innerHTML = '';
  if (!state.pais) {
    root.innerHTML = '<div class="entes-empty">Elegí un país para ver sus entes</div>';
    return;
  }
  const ids = (DATA.navegacion[state.vertical] || {})[state.pais] || [];
  if (ids.length === 0) {
    root.innerHTML = '<div class="entes-empty">Sin entes registrados para este país en esta vertical</div>';
    return;
  }
  ids.forEach(id => {
    const ente = DATA.entes[id];
    if (!ente) return;
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'ente-card';
    card.dataset.id = id;
    card.innerHTML = `
      <div class="ente-card-header">
        <div class="ente-card-sigla">${esc(ente.ente)}</div>
        <div class="ente-card-tipo">${esc(ente.tipo)}</div>
      </div>
      <div class="ente-card-rol">${esc(ente.rol)}</div>
    `;
    card.addEventListener('click', () => openDrawer(id));
    root.appendChild(card);
  });
}

// ============ DRAWER ============
function openDrawer(id) {
  const ente = DATA.entes[id];
  if (!ente) return;
  state.enteAbierto = id;

  document.getElementById('drawer-nombre').textContent = ente.nombre_completo || ente.ente || '—';

  const linkBlock = ente.url_oficial
    ? `<a class="drawer-link" href="${esc(ente.url_oficial)}" target="_blank" rel="noopener noreferrer"><span>↗</span><span>Visitar sitio oficial</span></a>`
    : '';

  const verticales = Array.isArray(ente.verticales) ? ente.verticales.join(', ') : '';

  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-sigla-row">
      <span class="drawer-sigla">${esc(ente.ente)} · ${esc(ente.id)}</span>
      <span class="drawer-tipo">${esc(ente.tipo)}</span>
    </div>
    <div class="drawer-rol">${esc(ente.rol)}</div>
    ${linkBlock}
    <div class="drawer-meta"><strong>${esc(ente.pais)}</strong> · ${esc(verticales)}</div>
  `;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-bg').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (history.replaceState) {
    history.replaceState(null, '', '#' + id);
  } else {
    location.hash = '#' + id;
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-bg').classList.remove('open');
  document.body.style.overflow = '';
  state.enteAbierto = null;
  if (history.replaceState) {
    history.replaceState(null, '', location.pathname + location.search);
  } else {
    location.hash = '';
  }
}

// ============ ESC PARA CERRAR ============
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
});

// ============ INIT ============
function init() {
  const hash = (location.hash || '').replace(/^#/, '');
  const enteHash = hash && DATA.entes[hash];

  if (enteHash) {
    const verts = Array.isArray(enteHash.verticales) ? enteHash.verticales : [];
    const verticalDefault = verts.includes('airports') ? 'airports' : (verts[0] || 'airports');
    state.vertical = verticalDefault;
    state.pais = enteHash.pais;
  }

  renderVerticales();
  renderPaises();
  renderEntes();

  if (enteHash) {
    openDrawer(hash);
  }
}

init();

// ============ PASSWORD GATE ============
(function(){
  var gate = document.getElementById('gate');
  var input = document.getElementById('gate-input');
  var error = document.getElementById('gate-error');
  var PASSWORD = 'latam';
  if (sessionStorage.getItem('rd_unlocked') === '1') {
    gate.style.display = 'none';
  } else {
    setTimeout(function(){ input.focus(); }, 100);
  }
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      if (input.value === PASSWORD) {
        sessionStorage.setItem('rd_unlocked','1');
        gate.style.opacity = '0';
        gate.style.transition = 'opacity 0.3s';
        setTimeout(function(){ gate.style.display = 'none'; }, 300);
      } else {
        error.style.opacity = '1';
        input.value = '';
        setTimeout(function(){ error.style.opacity = '0'; }, 1500);
      }
    }
  });
})();
</script>
